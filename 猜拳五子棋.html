<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Microsoft YaHei","PingFang SC","KaiTi",sans-serif;

    background-image:
        radial-gradient(ellipse at 20% 80%,rgba(80,60,40,0.06) 0%,transparent 60%),

body::before {
    content: ""; position: fixed;
    top:0;left:0;right:0;bottom:0;
    background:
        repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.008) 2px,rgba(0,0,0,0.008) 3px),

}
.seal-stamp {

.bamboo-left, .bamboo-right {

.bamboo-left { left: 12px; }
.bamboo-right { right: 12px; }
.bamboo-left::before {
    content: ""; position: absolute; left: 2px; top: 5%;

    background: linear-gradient(90deg,rgba(50,90,50,0.08),rgba(70,130,70,0.14),rgba(50,90,50,0.08));

}
.bamboo-left::after {
    content: ""; position: absolute; left: 18px; top: 18%;
    width: 5px; height: 38%;
    background: linear-gradient(90deg,rgba(60,100,60,0.06),rgba(80,140,80,0.10),rgba(60,100,60,0.06));

.bamboo-right::before {

}
.bamboo-right::after {

<body>
<div class="title">🎯 猜拳五子棋 🎯</div>
<div class="subtitle">水墨五子 · 石头剪刀布</div>
<div class="game-container">
    <div class="info-panel">
        <h3>📋 对局信息</h3>
        <div class="player-info">
            <div class="player-card" id="player1Card">
                <div>
                    <span class="player-name">👤 玩家1</span>
                    <span class="player-color" id="p1Color"></span>
                </div>
                <span class="player-score" id="player1Score">0</span>
            </div>
            <div class="player-card" id="player2Card">
                <div>
                    <span class="player-name">👤 玩家2</span>
                    <span class="player-color" id="p2Color"></span>
                </div>
                <span class="player-score" id="player2Score">0</span>
            </div>
        </div>
        <div class="turn-indicator">
            <div class="turn-dot black active" id="turnDot"></div>
            <span id="turnText">黑方回合</span>
        </div>
        <div class="current-piece">
            <div class="label">本回合棋子</div>
            <span class="piece-icon" id="pieceIcon">?</span>
            <div class="piece-type" id="pieceTypeText">等待落子</div>
        </div>
        <div class="rules-box">
            <div>⚡ 落子规则 · 五连后对方有一回合</div>
            <div>    猜拳机会，设法破解阻止五连</div>
            <div style="margin-top:2px"><span>✊</span>赢<span>✌️</span>  <span>✌️</span>赢<span>✋</span>  <span>✋</span>赢<span>✊</span></div>
            <div>双方不可预知 · 概率各 1/3</div>
        </div>

        <div class="kb-shortcuts">
            <div class="kb-title">⌨️ 键盘操作说明</div>
            <div style="font-weight:bold;color:#4a3520;font-size:0.7rem;margin-bottom:2px">👤 玩家1（当前回合时操作）</div>
            <div class="kb-row">
                <span class="kb-key">W</span><span class="kb-key">A</span><span class="kb-key">S</span><span class="kb-key">D</span>
                <span>移动光标</span>
            </div>
            <div class="kb-row">
                <span class="kb-key">Space</span>
                <span>确认落子</span>
            </div>
            <div style="font-weight:bold;color:#4a3520;font-size:0.7rem;margin:4px 0 2px">👤 玩家2（当前回合时操作）</div>
            <div class="kb-row">
                <span class="kb-key">↑</span><span class="kb-key">↓</span><span class="kb-key">←</span><span class="kb-key">→</span>
                <span>移动光标</span>
            </div>
            <div class="kb-row">
                <span class="kb-key">Enter</span>
                <span>确认落子</span>
            </div>
        </div>

    </div>
    <div>
        <div class="board-wrapper">
            <canvas id="boardCanvas"></canvas>
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="game.newGame()">🔄 新游戏</button>
            <button class="btn btn-secondary" onclick="game.undo()">↩ 悔棋</button>
            <button class="btn btn-secondary" onclick="game.resetScore()">🔄 重置比分</button>
            <button class="btn btn-danger" onclick="game.surrender()">🏳 投降</button>
        </div>
    </div>
</div>

<!-- 模式选择弹窗 -->
<div class="mode-overlay" id="modeModal">
    <div class="mode-box">
        <h3>🎯 选择对战模式</h3>

<script>
const EMPTY=0; const BLACK=1; const WHITE=2;
const ROCK="rock"; const SCISSORS="scissors"; const PAPER="paper";
const TYPE_EMOJI={rock:"🪨",scissors:"✌️",paper:"✋"};
const TYPE_NAME={rock:"石头",scissors:"剪刀",paper:"布"};
const COVERS={rock:SCISSORS,scissors:PAPER,paper:ROCK};
const COVERS_EMOJI={rock:"✌️",scissors:"✋",paper:"🪨"};
const COVERS_NAME={rock:"剪刀",scissors:"布",paper:"石头"};
class GomokuRPS{
    constructor(){
        this.size=19; this.cellSize=28; this.padding=24;
        this.board=Array.from({length:this.size},()=>Array(this.size).fill(null)); this.currentPlayer=BLACK; this.currentType=null;
        this.gameOver=false; this.winner=null; this.winLine=[];
        this.lastMove=null; this.hoverCell=null;
        this.player1Score=0; this.player2Score=0; this.moveCount=0;
        this.player1Color=null; this.player2Color=null;
        this.potentialWinLine=null; this.potentialWinPlayer=null; this.kbCursor={row:9,col:9}; this.history=[];
        this.choosingPlayer=1; this.kbCursor={row:9,col:9}; this.history=[];
        this.canvas=document.getElementById("boardCanvas");
        this.ctx=this.canvas.getContext("2d");
        this.noisePoints=[];
        this.onlineMode=false; this.peerConn=null; this.myPlayerIndex=-1; this.roomCode=null; this.opponentName=""; this.isMyTurn=false; this._processingRemote=false;
        this.setupCanvas(); this.bindEvents(); this.showModeModal();
    }
    setupCanvas(){
        this.fitBoard();
        window.addEventListener("resize",()=>{ this.fitBoard(); this.render(); });
    }
    fitBoard(){
        const rawDpr=window.devicePixelRatio||1;
        const dpr=Math.max(3,rawDpr);
        const maxW=Math.min(window.innerWidth-20,880);
        const maxH=Math.min(window.innerHeight-280,880);
        const maxDim=Math.min(maxW,maxH);
        this.padding=18; this.cellSize=Math.floor((maxDim-this.padding*2)/this.size);
        this.cellSize=Math.max(24,Math.min(this.cellSize,38));
        const total=this.size*this.cellSize+this.padding*2;
        this.canvas.width=total*dpr; this.canvas.height=total*dpr;
        this.canvas.style.width=total+"px"; this.canvas.style.height=total+"px";
        this.ctx.setTransform(dpr,0,0,dpr,0,0);
        this.generateNoise();
    }
    showColorModal(){
        document.getElementById("colorModal").classList.add("show");
        document.getElementById("colorModalPrompt").textContent="玩家"+this.choosingPlayer+"，请选择本局你的棋子颜色：";
        this.gameOver=true; this.render();
    }
    selectColor(choice){
        let p1IsBlack;
        if(choice==="random"){ p1IsBlack=Math.random()<0.5; }
        else{ p1IsBlack=(choice==="black"); }
        if(this.choosingPlayer===1){
            this.player1Color=p1IsBlack?BLACK:WHITE;
            this.player2Color=p1IsBlack?WHITE:BLACK;
        }else{
            this.player2Color=p1IsBlack?BLACK:WHITE;
            this.player1Color=p1IsBlack?WHITE:BLACK;
        }
        this.choosingPlayer=this.choosingPlayer===1?2:1;
        document.getElementById("colorModal").classList.remove("show");
        this.startGame();
    }
    startGame(){
        this.board=Array.from({length:this.size},()=>Array(this.size).fill(null));
        this.currentPlayer=BLACK; this.gameOver=false; this.winner=null;
        this.winLine=[]; this.lastMove=null; this.moveCount=0;
        this.potentialWinLine=null; this.potentialWinPlayer=null; this.kbCursor={row:9,col:9}; this.history=[];
        this.rollType(); this.updateUI(); this.render(); this.hideToast();
    }
    newGame(){ this.showColorModal(); }
    resetScore(){
        this.player1Score=0; this.player2Score=0;
        document.getElementById("player1Score").textContent="0";
        document.getElementById("player2Score").textContent="0";
        this.showColorModal();
    }
    countPiecesByType(color){
        const counts={rock:0,scissors:0,paper:0};
        for(let r=0;r<this.size;r++){for(let c=0;c<this.size;c++){const p=this.board[r][c];if(p&&p.color===color)counts[p.type]++;}}
    }
    computeCoverableProbs(){
        const opponent=this.currentPlayer===BLACK?WHITE:BLACK;
        const oppCounts=this.countPiecesByType(opponent);
        const weights={rock:oppCounts.scissors,scissors:oppCounts.paper,paper:oppCounts.rock};
        const total=weights.rock+weights.scissors+weights.paper;
        if(total===0)return{rock:1/3,scissors:1/3,paper:1/3};
        return{rock:weights.rock/total,scissors:weights.scissors/total,paper:weights.paper/total};
    }
    evaluateThreat(color){
        let score=0;const dirs=[[0,1],[1,0],[1,1],[1,-1]];
        for(let r=0;r<this.size;r++){for(let c=0;c<this.size;c++){
            const piece=this.board[r][c];if(!piece||piece.color!==color)continue;
            for(const[dr,dc]of dirs){
                const pr=r-dr,pc=c-dc;
                if(pr>=0&&pr<this.size&&pc>=0&&pc<this.size&&this.board[pr][pc]&&this.board[pr][pc].color===color)continue;
                let count=1;let cr=r+dr,cc=c+dc;
                while(cr>=0&&cr<this.size&&cc>=0&&cc<this.size&&this.board[cr][cc]&&this.board[cr][cc].color===color){count++;cr+=dr;cc+=dc;}
                if(count<2)continue;
                const beforeOpen=(pr>=0&&pr<this.size&&pc>=0&&pc<this.size&&!this.board[pr][pc]);
                const afterOpen=(cr>=0&&cr<this.size&&cc>=0&&cc<this.size&&!this.board[cr][cc]);
                const openEnds=(beforeOpen?1:0)+(afterOpen?1:0);
                if(count>=5)score+=100;
                else if(count===4&&openEnds===2)score+=20;
                else if(count===4&&openEnds===1)score+=10;
                else if(count===3&&openEnds===2)score+=6;
                else if(count===2&&openEnds===2)score+=2;
            }
        }}
        return score;
    }
    computeThreatBias(){
        const opponent=this.currentPlayer===BLACK?WHITE:BLACK;
        const currentThreat=this.evaluateThreat(this.currentPlayer);
        const oppThreat=this.evaluateThreat(opponent);
        const totalThreat=currentThreat+oppThreat;
        if(totalThreat===0)return 0.5;
        return 0.2+0.6*(oppThreat/totalThreat);
    }
    computeCountDiffBias(){
        const opponent=this.currentPlayer===BLACK?WHITE:BLACK;
        let currentCount=0,oppCount=0;
        for(let r=0;r<this.size;r++){for(let c=0;c<this.size;c++){const p=this.board[r][c];if(!p)continue;if(p.color===this.currentPlayer)currentCount++;else if(p.color===opponent)oppCount++;}}
        const total=currentCount+oppCount;
        if(total===0)return 0.5;
        return 0.2+0.6*(oppCount/total);
    }
    rollType(){
        const mc=this.moveCount;
        if(mc<30){const r=Math.random();if(r<1/3)this.currentType=ROCK;else if(r<2/3)this.currentType=SCISSORS;else this.currentType=PAPER;return;}
        const covProbs=this.computeCoverableProbs();
        let biasStrength;
        if(mc<150){
            const threatBias=this.computeThreatBias();
            const countBias=this.computeCountDiffBias();
            biasStrength=Math.max(0.06,Math.min(0.80,0.50+(threatBias-0.5)*0.35+(countBias-0.5)*0.25));
        }else{
            const threatBias=this.computeThreatBias();
            const countBias=this.computeCountDiffBias();
            biasStrength=Math.max(0.10,Math.min(0.88,0.55+(threatBias-0.5)*0.35+(countBias-0.5)*0.25));
        }
        const dynamicProbs={
            rock:(1/3)*(1-biasStrength)+covProbs.rock*biasStrength,
            scissors:(1/3)*(1-biasStrength)+covProbs.scissors*biasStrength,
            paper:(1/3)*(1-biasStrength)+covProbs.paper*biasStrength,
        };
        const fp={
            rock:(1/3)*0.65+dynamicProbs.rock*0.35,
            scissors:(1/3)*0.65+dynamicProbs.scissors*0.35,
            paper:(1/3)*0.65+dynamicProbs.paper*0.35,
        };
        const r=Math.random();
        if(r<fp.rock)this.currentType=ROCK;
        else if(r<fp.rock+fp.scissors)this.currentType=SCISSORS;
        else this.currentType=PAPER;
    }
    isValidMove(row,col){
        if(this.gameOver)return false;
        if(row<0||row>=this.size||col<0||col>=this.size)return false;
        const cell=this.board[row][col];
        if(cell===null)return true;
        if(COVERS[this.currentType]===cell.type)return true;
        return false;
    }
    placePiece(row,col){
        if(this.onlineMode&&this.currentPlayer!==(this.myPlayerIndex===0?this.player1Color:this.player2Color))return false;
        if(!this.isValidMove(row,col))return false;
        const cell=this.board[row][col];
        const _placedType=this.currentType; const _wasOverride=this.board[row][col]!==null;
        this.history.push({row,col,prevCell:cell?{color:cell.color,type:cell.type}:null,currentPlayer:this.currentPlayer,currentType:this.currentType,moveCount:this.moveCount,potentialWinLine:this.potentialWinLine?this.potentialWinLine.map(([r,c])=>[r,c]):null,potentialWinPlayer:this.potentialWinPlayer,gameOver:this.gameOver,winner:this.winner,winLine:this.winLine.map(([r,c])=>[r,c]),lastMove:this.lastMove?{row:this.lastMove.row,col:this.lastMove.col}:null});
        this.board[row][col]={color:this.currentPlayer,type:this.currentType};
        this.lastMove={row,col}; this.moveCount++;
        if(this.potentialWinLine!==null){
            const stillIntact=this.potentialWinLine.every(([r,c])=>{ const p=this.board[r][c]; return p&&p.color===this.potentialWinPlayer; });
            if(stillIntact){
                this.gameOver=true; this.winner=this.potentialWinPlayer; this.winLine=this.potentialWinLine;
                this.awardScore(this.potentialWinPlayer); this.showWinToast();
            }else{
                this.potentialWinLine=null; this.potentialWinPlayer=null; this.kbCursor={row:9,col:9}; this.history=[];
                this.currentPlayer=this.currentPlayer===BLACK?WHITE:BLACK; this.rollType();
            }
            this.updateUI(); this.render(); if(this.onlineMode)this.sendToOpponent({type:"move",row:row,col:col,pieceType:_placedType,nextType:this.currentType,isOverride:_wasOverride}); return true;
        }
        const fiveLine=this.checkWin(row,col);

            const nextPlayer=this.currentPlayer===BLACK?WHITE:BLACK;
            const savedType=this.currentType;
            this.rollType(); const oppType=this.currentType; this.currentType=savedType;
            this.potentialWinLine=fiveLine; this.potentialWinPlayer=this.currentPlayer;
            this.currentPlayer=nextPlayer; this.currentType=oppType;
            this.showToast("五子连珠！对方有机会用猜拳破解！","warn");
        }else if(this.moveCount>=this.size*this.size){
            this.gameOver=true; this.winner=null;
        }else{
            this.currentPlayer=this.currentPlayer===BLACK?WHITE:BLACK; this.rollType();
        }
        
this.updateUI(); this.render(); if(this.onlineMode)this.sendToOpponent({type:"move",row:row,col:col,pieceType:_placedType,nextType:this.currentType,isOverride:_wasOverride}); return true;
    }
    checkWin(row,col){
        const piece=this.board[row][col]; if(!piece)return null; const color=piece.color;
        const dirs=[[0,1],[1,0],[1,1],[1,-1]];
        for(const[dr,dc]of dirs){
            const line=[[row,col]];
            for(let i=1;i<5;i++){ const r=row+dr*i; const c=col+dc*i; if(r>=0&&r<this.size&&c>=0&&c<this.size&&this.board[r][c]&&this.board[r][c].color===color){ line.push([r,c]); }else break; }
            for(let i=1;i<5;i++){ const r=row-dr*i; const c=col-dc*i; if(r>=0&&r<this.size&&c>=0&&c<this.size&&this.board[r][c]&&this.board[r][c].color===color){ line.unshift([r,c]); }else break; }
            if(line.length>=5)return line;
        }
        return null;
    }
    bindEvents(){
        const getCell=(e)=>{
            const rect=this.canvas.getBoundingClientRect();
            const cx="touches"in e?e.touches[0].clientX:e.clientX;
            const cy="touches"in e?e.touches[0].clientY:e.clientY;

            else return;
            this.render();
        });
    }
    generateNoise(){
        const w=this.size*this.cellSize+this.padding*2;
        const h=w;
        this.noisePoints=[];
        for(let i=0;i<200;i++){
            this.noisePoints.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+0.5});
        }
    }
    render(){

        ctx.fillStyle="rgba(200,180,150,0.03)"; for(let i=0;i<this.noisePoints.length;i++){ const p=this.noisePoints[i]; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }

        for(const[r,c]of sps){ const cx=this.padding+c*this.cellSize; const cy=this.padding+r*this.cellSize; ctx.fillStyle="#3a2a10"; ctx.beginPath(); ctx.arc(cx,cy,3.5,0,Math.PI*2); ctx.fill(); }
        if(this.potentialWinLine&&!this.gameOver){ for(const[r,c]of this.potentialWinLine){ const cx=this.padding+c*this.cellSize; const cy=this.padding+r*this.cellSize; ctx.strokeStyle="#d4a030"; ctx.lineWidth=3; ctx.setLineDash([4,3]); ctx.beginPath(); ctx.arc(cx,cy,this.cellSize*0.46,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]); } }
        for(let r=0;r<this.size;r++){ for(let c=0;c<this.size;c++){ const piece=this.board[r][c]; if(piece){ const cx=this.padding+c*this.cellSize; const cy=this.padding+r*this.cellSize; this.drawPiece(cx,cy,piece.color,piece.type,false); } } }
        if(this.hoverCell&&!this.gameOver){ const{row,col}=this.hoverCell; const cx=this.padding+col*this.cellSize; const cy=this.padding+row*this.cellSize; const valid=this.isValidMove(row,col); if(valid){ const io=this.board[row][col]!==null; if(io){ ctx.strokeStyle="#c05030"; ctx.lineWidth=2.5; ctx.setLineDash([4,3]); ctx.beginPath(); ctx.arc(cx,cy,this.cellSize*0.46,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]); } this.drawPiece(cx,cy,this.currentPlayer,this.currentType,true,io); }else{ ctx.fillStyle="rgba(180,80,40,0.12)"; ctx.beginPath(); ctx.arc(cx,cy,this.cellSize*0.46,0,Math.PI*2); ctx.fill(); } }
        if(this.kbCursor&&!this.gameOver){ const{row,col}=this.kbCursor; const cx=this.padding+col*this.cellSize; const cy=this.padding+row*this.cellSize; const p1turn=(this.currentPlayer===this.player1Color); ctx.strokeStyle="#4a90d9"; ctx.lineWidth=2.5; ctx.setLineDash([5,3]); ctx.beginPath(); ctx.arc(cx,cy,this.cellSize*0.48,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]); ctx.fillStyle="rgba(74,144,217,0.12)"; ctx.beginPath(); ctx.arc(cx,cy,this.cellSize*0.47,0,Math.PI*2); ctx.fill(); const hintText=p1turn?"WASD / Space":"Arrows / Enter"; ctx.font="bold "+(this.cellSize*0.32)+"px 'Microsoft YaHei','PingFang SC',sans-serif"; const tm=ctx.measureText(hintText); const lx=cx+this.cellSize*0.6; const ly=cy-this.cellSize*0.65; const lw=tm.width+10; const lh=this.cellSize*0.42; ctx.fillStyle="rgba(74,144,217,0.88)"; ctx.beginPath(); const rx=lx-2; const ry=ly-lh/2-2; ctx.moveTo(rx+4,ry); ctx.lineTo(rx+lw-4,ry); ctx.quadraticCurveTo(rx+lw,ry,rx+lw,ry+4); ctx.lineTo(rx+lw,ry+lh-4); ctx.quadraticCurveTo(rx+lw,ry+lh,rx+lw-4,ry+lh); ctx.lineTo(rx+4,ry+lh); ctx.quadraticCurveTo(rx,ry+lh,rx,ry+lh-4); ctx.lineTo(rx,ry+4); ctx.quadraticCurveTo(rx,ry,rx+4,ry); ctx.closePath(); ctx.fill(); ctx.fillStyle="#fff"; ctx.textAlign="left"; ctx.textBaseline="middle"; ctx.fillText(hintText,lx+3,ly); ctx.textAlign="start"; ctx.textBaseline="alphabetic"; }
        if(this.winLine.length>0){ for(const[r,c]of this.winLine){ const cx=this.padding+c*this.cellSize; const cy=this.padding+r*this.cellSize; ctx.strokeStyle="#b83020"; ctx.lineWidth=3; ctx.shadowColor="#b83020"; ctx.shadowBlur=8; ctx.beginPath(); ctx.arc(cx,cy,this.cellSize*0.47,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0; } }
        if(this.lastMove&&!this.gameOver){ const cx=this.padding+this.lastMove.col*this.cellSize; const cy=this.padding+this.lastMove.row*this.cellSize; ctx.strokeStyle="#e04040"; ctx.lineWidth=2.5; ctx.shadowColor="#e04040"; ctx.shadowBlur=6; ctx.beginPath(); ctx.arc(cx,cy,this.cellSize*0.48,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0; }
    }    drawPiece(cx,cy,color,type,ghost,isOverride=false){
        const ctx=this.ctx; const r=this.cellSize*0.43; const alpha=ghost?0.5:1.0;
        ctx.save(); ctx.globalAlpha=alpha;
        // 3D sphere with shadow, gradient, and multiple highlight rings
        ctx.shadowColor="rgba(0,0,0,0.4)"; ctx.shadowBlur=r*0.35; ctx.shadowOffsetX=r*0.06; ctx.shadowOffsetY=r*0.12;
        const grad=ctx.createRadialGradient(cx-r*0.32,cy-r*0.38,r*0.08,cx,cy,r);
        if(color===BLACK){
            grad.addColorStop(0,"#999");
            grad.addColorStop(0.3,"#555");
            grad.addColorStop(0.55,"#2a2a2a");
            grad.addColorStop(0.8,"#111");
            grad.addColorStop(1,"#050505");
        }else{
            grad.addColorStop(0,"#ffffff");
            grad.addColorStop(0.3,"#faf6ef");
            grad.addColorStop(0.55,"#f0e8d8");
            grad.addColorStop(0.8,"#d8cfb8");
            grad.addColorStop(1,"#b8af9a");
        }
        ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
        ctx.shadowColor="transparent"; ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
        // Outer rim
        ctx.strokeStyle=color===BLACK?"#222":"#a09888"; ctx.lineWidth=Math.max(1.8,r*0.11); ctx.stroke();
        // Specular highlight (top-left light reflection)
        ctx.strokeStyle=color===BLACK?"rgba(255,255,255,0.18)":"rgba(255,255,255,0.7)";
        ctx.lineWidth=Math.max(1.2,r*0.07);
        ctx.beginPath(); ctx.arc(cx-r*0.06,cy-r*0.09,r*0.72,-Math.PI*0.7,Math.PI*0.3); ctx.stroke();
        // Secondary inner ring for material depth
        ctx.strokeStyle=color===BLACK?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.05)";
        ctx.lineWidth=Math.max(0.8,r*0.05);
        ctx.beginPath(); ctx.arc(cx-r*0.04,cy-r*0.06,r*0.58,0,Math.PI*2); ctx.stroke();
        // Override dashed indicator
        if(isOverride&&!ghost){
            ctx.strokeStyle="#c05030"; ctx.lineWidth=Math.max(2.2,r*0.13);

            ctx.stroke(); ctx.setLineDash([]);
        }
        // Draw emoji icon on piece
        const emoji=TYPE_EMOJI[type]||"?";
        const fontSize=r*1.22;
        ctx.font=fontSize+"px 'Microsoft YaHei','PingFang SC','Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif";
        ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText(emoji,cx,cy);
        ctx.textAlign="start"; ctx.textBaseline="alphabetic";
        ctx.restore();
    }
        awardScore(color){
        if(this.player1Color===color)this.player1Score++;
        else if(this.player2Color===color)this.player2Score++;
    }
    getCurrentPlayerName(){
        if(this.currentPlayer===this.player1Color)return"玩家1";
        if(this.currentPlayer===this.player2Color)return"玩家2";
        return"";
    }
    getWinnerPlayerName(){
        if(!this.winner)return"";
        if(this.winner===this.player1Color)return"玩家1";
        if(this.winner===this.player2Color)return"玩家2";
        return"";
    }
    updateUI(){
        const td=document.getElementById("turnDot"); const tt=document.getElementById("turnText");
        const pi=document.getElementById("pieceIcon"); const pt=document.getElementById("pieceTypeText");
        
        const p1c=document.getElementById("player1Card"); const p2c=document.getElementById("player2Card");
        const p1col=document.getElementById("p1Color"); const p2col=document.getElementById("p2Color");
        if(this.player1Color===BLACK){ p1col.textContent=" ⚫黑棋"; p2col.textContent=" ⚪白棋"; }
        else{ p1col.textContent=" ⚪白棋"; p2col.textContent=" ⚫黑棋"; }
        if(!this.gameOver){
            const cpn=this.getCurrentPlayerName();
            if(cpn==="玩家1"){ p1c.classList.add("current-turn"); p2c.classList.remove("current-turn"); }
            else{ p2c.classList.add("current-turn"); p1c.classList.remove("current-turn"); }
        }else{ p1c.classList.remove("current-turn"); p2c.classList.remove("current-turn"); }
        document.getElementById("player1Score").textContent=this.player1Score;
        document.getElementById("player2Score").textContent=this.player2Score;
        if(this.gameOver){
            if(this.winner){ const wn=this.getWinnerPlayerName(); tt.textContent=wn+"获胜！🎉"; td.className="turn-dot "+(this.winner===BLACK?"black":"white")+" active"; }
            else{ tt.textContent="平局！"; td.className="turn-dot"; }
            pi.textContent="🏆"; pt.textContent="游戏结束";
        }else{
            const pn=this.getCurrentPlayerName(); const cn=this.currentPlayer===BLACK?"黑方":"白方";
            tt.textContent=pn+" · "+cn+"回合";
            if(this.potentialWinLine)tt.textContent+=" ⚠破解机会！";
            td.className="turn-dot "+(this.currentPlayer===BLACK?"black":"white")+" active";
            pi.textContent=TYPE_EMOJI[this.currentType]||"?"; pt.textContent=TYPE_NAME[this.currentType]||"";
        }
        
    }
    showToast(text,type="info"){ const toast=document.getElementById("toast"); toast.textContent=text; toast.className="toast "+type+" show"; setTimeout(()=>toast.classList.remove("show"),3000); }
    showWinToast(){ const wn=this.getWinnerPlayerName(); this.showToast(wn+" 猜拳破解获胜！🎉","win"); }
    hideToast(){ document.getElementById("toast").classList.remove("show"); }
    undo(){
        if(this.gameOver||this.history.length===0||document.getElementById("colorModal").classList.contains("show"))return;
        const s=this.history.pop();
        this.board[s.row][s.col]=s.prevCell;
        this.lastMove=s.lastMove;
        this.moveCount=s.moveCount;
        this.currentPlayer=s.currentPlayer;
        this.currentType=s.currentType;
        this.potentialWinLine=s.potentialWinLine;
        this.potentialWinPlayer=s.potentialWinPlayer;
        this.gameOver=s.gameOver;
        this.winner=s.winner;
        this.winLine=s.winLine;
        this.kbCursor={row:s.row,col:s.col};
        this.updateUI(); this.render(); this.hideToast(); if(this.onlineMode&&!this._processingRemote)this.sendToOpponent({type:"undo"});
    }
    surrender(){
        if(this.gameOver||document.getElementById("colorModal").classList.contains("show"))return;
        this.gameOver=true;
        this.winner=this.currentPlayer===BLACK?WHITE:BLACK;
        this.awardScore(this.winner);
        this.showWinToast();
        this.updateUI(); this.render(); if(this.onlineMode&&!this._processingRemote)this.sendToOpponent({type:"surrender"});
    }
    showModeModal(){
        document.getElementById("modeModal").classList.remove("hidden");
        document.getElementById("colorModal").classList.remove("show");
        this.gameOver=true; this.render();
    }
    initOnline(conn,myIndex,roomCode){
        this.onlineMode=true; this.peerConn=conn; this.myPlayerIndex=myIndex; this.roomCode=roomCode;
        this.isMyTurn=(myIndex===0);
        // Host is player 1 (black), joiner is player 2 (white)
        if(myIndex===0){ this.player1Color=BLACK; this.player2Color=WHITE; }
        else{ this.player1Color=WHITE; this.player2Color=BLACK; }
        this.choosingPlayer=2; // skip color modal
        document.getElementById("modeModal").classList.add("hidden");
        document.getElementById("colorModal").classList.remove("show");
        document.getElementById("lobbyActions").classList.add("hidden");
        document.getElementById("waitingInfo").classList.add("hidden");
        document.getElementById("leaveOnlineBtn").classList.remove("hidden");
        document.getElementById("rematchBanner").classList.add("hidden");
        this.startGame();
    }
    applyRemoteMove(data){
        // data: {row, col, pieceType, nextType, isOverride}
        if(this.gameOver)return;
        // Place the piece directly
        const cell=this.board[data.row][data.col];
        this.history.push({
            row:data.row,col:data.col,
            prevCell:cell?{color:cell.color,type:cell.type}:null,
            currentPlayer:this.currentPlayer,currentType:this.currentType,
            moveCount:this.moveCount,
            potentialWinLine:this.potentialWinLine?this.potentialWinLine.map(([r,c])=>[r,c]):null,
            potentialWinPlayer:this.potentialWinPlayer,
            gameOver:this.gameOver,winner:this.winner,
            winLine:this.winLine.map(([r,c])=>[r,c]),
            lastMove:this.lastMove?{row:this.lastMove.row,col:this.lastMove.col}:null
        });
        this.board[data.row][data.col]={color:this.currentPlayer,type:data.pieceType};
        this.lastMove={row:data.row,col:data.col}; this.moveCount++;
        this.isMyTurn=true;
        // Handle potentialWinLine (override scenario)
        if(this.potentialWinLine!==null){
            const stillIntact=this.potentialWinLine.every(([r,c])=>{
                const p=this.board[r][c]; return p&&p.color===this.potentialWinPlayer;
            });
            if(stillIntact){
                this.gameOver=true; this.winner=this.potentialWinPlayer; this.winLine=this.potentialWinLine;
                this.awardScore(this.potentialWinPlayer); this.showWinToast();
            }else{
                this.potentialWinLine=null; this.potentialWinPlayer=null; this.kbCursor={row:9,col:9}; this.history=[];
                this.currentPlayer=this.currentPlayer===BLACK?WHITE:BLACK;
                this.currentType=data.nextType;
            }
            this.updateUI(); this.render(); return;
        }
        const fiveLine=this.checkWin(data.row,data.col);
        if(fiveLine){
            this.potentialWinLine=fiveLine; this.potentialWinPlayer=this.currentPlayer;
            this.currentPlayer=this.currentPlayer===BLACK?WHITE:BLACK;
            this.currentType=data.nextType;
            this.showToast("对方五子连珠！你有机会用猜拳破解！","warn");
        }else if(this.moveCount>=this.size*this.size){
            this.gameOver=true; this.winner=null;
        }else{
            this.currentPlayer=this.currentPlayer===BLACK?WHITE:BLACK;
            this.currentType=data.nextType;
        }
        this.updateUI(); this.render();
    }
    sendToOpponent(msg){
        if(!this.peerConn||!this.peerConn.open)return;
        this.peerConn.send(msg);
    }
}
const game=new GomokuRPS();

// === 联机相关全局函数 ===

// === 联机相关全局函数 (PeerJS P2P) ===
let peer=null;
let peerConn=null;
let onlineRoomCode=null;
let onlineMyIndex=-1;

function startLocalMode(){
    document.getElementById("modeModal").classList.add("hidden");
    document.getElementById("lobbyPanel").classList.add("hidden");
    game.showColorModal();
}

function showLobby(){
    document.getElementById("modeModal").classList.add("hidden");
    document.getElementById("lobbyPanel").classList.remove("hidden");
    document.getElementById("lobbyActions").classList.remove("hidden");
    document.getElementById("roomInfo").classList.add("hidden");
    document.getElementById("waitingInfo").classList.add("hidden");
    document.getElementById("opponentInfo").classList.add("hidden");
    document.getElementById("leaveOnlineBtn").classList.add("hidden");
    document.getElementById("rematchBanner").classList.add("hidden");
    document.getElementById("connectionStatus").innerHTML="";
    if(!document.getElementById("playerNameInput").value){
        document.getElementById("playerNameInput").value="玩家"+(["甲","乙","丙","丁","戊"][Math.floor(Math.random()*5)]);
    }
}

function setupPeerConnection(conn){
    peerConn=conn;
    conn.on("data",(data)=>{
        handlePeerData(data);
    });
    conn.on("close",()=>{
        document.getElementById("connectionStatus").innerHTML='<span class="connection-dot offline"></span>连接已断开';
        if(!game.gameOver&&game.onlineMode){
            game.showToast("对手已断开连接","warn");
        }
    });
}

function createRoom(){
    if(peer){ peer.destroy(); peer=null; }
    if(peerConn){ peerConn.close(); peerConn=null; }
    const name=document.getElementById("playerNameInput").value.trim()||"玩家甲";
    document.getElementById("connectionStatus").innerHTML='<span class="connection-dot connecting"></span>正在生成房间...';
    try{
        peer=new Peer();
        peer.on("open",(id)=>{
            onlineRoomCode=id; onlineMyIndex=0;
            document.getElementById("roomCodeDisplay").textContent=id;
            document.getElementById("lobbyActions").classList.add("hidden");
            document.getElementById("roomInfo").classList.remove("hidden");
            document.getElementById("waitingInfo").classList.remove("hidden");
            document.getElementById("connectionStatus").innerHTML='<span class="connection-dot online"></span>房间已创建，等待对手...';
            game.showToast("房间已创建，分享房间码给好友！");
        });
        peer.on("connection",(conn)=>{
            setupPeerConnection(conn);
            document.getElementById("waitingInfo").classList.add("hidden");
            document.getElementById("opponentInfo").classList.remove("hidden");
            document.getElementById("opponentNameDisplay").textContent=conn.metadata&&conn.metadata.name||"对手";
            document.getElementById("leaveOnlineBtn").classList.remove("hidden");
            game.showToast("对手加入了房间，游戏开始！");
            conn.on("open",()=>{
                // Send our name
                conn.send({type:"hello",name:name});
            });
            game.initOnline(conn,0,onlineRoomCode);
        });
        peer.on("error",(err)=>{
            document.getElementById("connectionStatus").innerHTML='<span class="connection-dot offline"></span>连接失败';
            game.showToast("创建房间失败: "+err.type,"warn");
        });
    }catch(err){
        document.getElementById("connectionStatus").innerHTML='<span class="connection-dot offline"></span>无法创建房间';
        game.showToast("无法创建房间","warn");
    }
}

function joinRoom(){
    if(peer){ peer.destroy(); peer=null; }
    if(peerConn){ peerConn.close(); peerConn=null; }
    const code=document.getElementById("joinCodeInput").value.trim();
    if(!code){game.showToast("请输入房间码");return;}
    const name=document.getElementById("playerNameInput").value.trim()||"玩家乙";
    document.getElementById("connectionStatus").innerHTML='<span class="connection-dot connecting"></span>正在加入房间...';
    try{
        peer=new Peer();
        peer.on("open",()=>{
            const conn=peer.connect(code,{metadata:{name:name}});
            conn.on("open",()=>{
                onlineRoomCode=code; onlineMyIndex=1;
                document.getElementById("connectionStatus").innerHTML='<span class="connection-dot online"></span>已连接到对手';
                document.getElementById("lobbyActions").classList.add("hidden");
                document.getElementById("roomInfo").classList.remove("hidden");
                document.getElementById("roomCodeDisplay").textContent=code;
                document.getElementById("opponentInfo").classList.remove("hidden");
                document.getElementById("opponentNameDisplay").textContent="对手";
                document.getElementById("leaveOnlineBtn").classList.remove("hidden");
                game.showToast("已加入房间，游戏开始！");
                game.initOnline(conn,1,code);
            conn.on("close",()=>{
                document.getElementById("connectionStatus").innerHTML='<span class="connection-dot offline"></span>连接已断开';
                if(!game.gameOver&&game.onlineMode){
                    game.showToast("对手已断开连接","warn");
                }
            });
            });
            // Handle hello message for opponent name
            conn.on("data",(data)=>{
                if(data.type==="hello"){
                    document.getElementById("opponentNameDisplay").textContent=data.name||"对手";
                    return;
                }
                handlePeerData(data);
            });
        });
        peer.on("error",(err)=>{
            document.getElementById("connectionStatus").innerHTML='<span class="connection-dot offline"></span>加入失败';
            if(err.type==="peer-unavailable"){
                game.showToast("房间不存在或已关闭","warn");
            }else{
                game.showToast("加入房间失败: "+err.type,"warn");
            }
        });
    }catch(err){
        document.getElementById("connectionStatus").innerHTML='<span class="connection-dot offline"></span>无法加入房间';
        game.showToast("无法加入房间","warn");
    }
}

function handlePeerData(data){
    switch(data.type){
        case "move":
            if(game.onlineMode){ game._processingRemote=true;
                game.applyRemoteMove(data);
            game._processingRemote=false; }
            break;
        case "undo":
            if(game.onlineMode){ game._processingRemote=true;
                game.undo();
            game._processingRemote=false; }
            break;
        case "surrender":
            if(game.onlineMode){ game._processingRemote=true;
                game.surrender();
            game._processingRemote=false; }
            break;
        case "rematch_request":
            if(game.gameOver&&game.onlineMode){
                document.getElementById("rematchBanner").classList.remove("hidden");
                document.getElementById("rematchText").textContent="对手邀请你再来一局！";
            }
            break;
    }
}

function copyRoomCode(){
    const code=document.getElementById("roomCodeDisplay").textContent;
    if(code){
        navigator.clipboard.writeText(code).then(()=>{
            game.showToast("房间码已复制！");
        }).catch(()=>{
            const ta=document.createElement("textarea");
            ta.value=code; document.body.appendChild(ta);
            ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
            game.showToast("房间码已复制！");
        });
    }
}

function leaveLobby(){
    if(peerConn){ peerConn.close(); peerConn=null; }
    if(peer){ peer.destroy(); peer=null; }
    onlineRoomCode=null; onlineMyIndex=-1;
    document.getElementById("lobbyPanel").classList.add("hidden");
    document.getElementById("modeModal").classList.remove("hidden");
}

function leaveOnlineGame(){
    if(peerConn){ peerConn.close(); peerConn=null; }
    if(peer){ peer.destroy(); peer=null; }
    game.onlineMode=false; game.peerConn=null;
    game.gameOver=true;
    onlineRoomCode=null; onlineMyIndex=-1;
    document.getElementById("lobbyPanel").classList.add("hidden");
    document.getElementById("modeModal").classList.remove("hidden");
    game.updateUI(); game.render();
}

function requestRematch(){
    if(!game.onlineMode||!peerConn||!peerConn.open)return;
    peerConn.send({type:"rematch_request"});
    document.getElementById("rematchBanner").classList.remove("hidden");
    document.getElementById("rematchText").textContent="已发送再战邀请，等待对手回应...";
}

function acceptRematch(){
    document.getElementById("rematchBanner").classList.add("hidden");
    game.initOnline(peerConn,onlineMyIndex,onlineRoomCode);
}

function declineRematch(){
    document.getElementById("rematchBanner").classList.add("hidden");
    game.showToast("已拒绝再战邀请");
}

// Add rematch button when game is over in online mode
const origUpdateUI=game.updateUI.bind(game);
game.updateUI=function(){
    origUpdateUI();
    const rematchBtn=document.getElementById("rematchOnlineBtn");
    if(this.gameOver&&this.onlineMode){
        if(!rematchBtn){
            const btn=document.createElement("button");
            btn.id="rematchOnlineBtn";
            btn.className="btn btn-primary";
            btn.textContent="🔄 再来一局";
            btn.onclick=requestRematch;
            btn.style.marginLeft="8px";
            const btnRow=document.querySelector(".btn-row");
            if(btnRow)btnRow.appendChild(btn);
        }
    }else{
        if(rematchBtn)rematchBtn.remove();
    }
};
